# 方案 A：单机 Docker 部署（Nginx + Backend + PostgreSQL + Redis）
# 用法：cd deploy && cp .env.example .env && 编辑 .env && ./scripts/deploy.sh

services:
  postgres:
    image: postgres:16
    container_name: zdsj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zdsj}
      POSTGRES_USER: ${POSTGRES_USER:-zdsj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zdsj} -d ${POSTGRES_DB:-zdsj}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7
    container_name: zdsj-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: zdsj-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - avatar_data:/data/avatars
      - product_image_data:/data/product-images
      # 40 款种子采价清单（宿主机维护，改完重启 backend 生效）
      - ../backend/price-seeds.yml:/app/price-seeds.yml:ro
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-zdsj}
      DB_USER: ${POSTGRES_USER:-zdsj}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET}
      WX_APPID: ${WX_APPID:-}
      WX_SECRET: ${WX_SECRET:-}
      WX_SUB_TEMPLATE: ${WX_SUB_TEMPLATE:-}
      AFFILIATE_MOCK: ${AFFILIATE_MOCK:-false}
      JD_PROVIDER_PRIMARY: ${JD_PROVIDER_PRIMARY:-veapi}
      JD_PROVIDER_FALLBACK: ${JD_PROVIDER_FALLBACK:-jd_official}
      JD_PROVIDER_AUTO_FAILOVER: ${JD_PROVIDER_AUTO_FAILOVER:-true}
      PDD_PROVIDER_PRIMARY: ${PDD_PROVIDER_PRIMARY:-veapi}
      PDD_PROVIDER_FALLBACK: ${PDD_PROVIDER_FALLBACK:-}
      PDD_PROVIDER_AUTO_FAILOVER: ${PDD_PROVIDER_AUTO_FAILOVER:-true}
      VEAPI_BASE_URL: ${VEAPI_BASE_URL:-http://api.veapi.cn}
      VEAPI_VEKEY: ${VEAPI_VEKEY:-}
      VEAPI_SECRET: ${VEAPI_SECRET:-}
      VEAPI_JD_SESSIONKEY: ${VEAPI_JD_SESSIONKEY:-}
      VEAPI_JD_UNION_ID: ${VEAPI_JD_UNION_ID:-}
      VEAPI_JD_POSITION_ID: ${VEAPI_JD_POSITION_ID:-}
      VEAPI_JD_SCENE_ID: ${VEAPI_JD_SCENE_ID:-2}
      VEAPI_JD_CHAIN_TYPE: ${VEAPI_JD_CHAIN_TYPE:-1}
      VEAPI_PDD_SESSIONKEY: ${VEAPI_PDD_SESSIONKEY:-}
      VEAPI_PDD_PID: ${VEAPI_PDD_PID:-}
      PDD_CLIENT_ID: ${PDD_CLIENT_ID:-}
      PDD_CLIENT_SECRET: ${PDD_CLIENT_SECRET:-}
      PDD_PID: ${PDD_PID:-}
      JD_APP_KEY: ${JD_APP_KEY:-}
      JD_APP_SECRET: ${JD_APP_SECRET:-}
      JD_UNION_ID: ${JD_UNION_ID:-}
      JD_SITE_ID: ${JD_SITE_ID:-}
      JD_POSITION_ID: ${JD_POSITION_ID:-}
      AI_MOCK: ${AI_MOCK:-false}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL_HIGH: ${AI_MODEL_HIGH:-deepseek-v4-flash}
      AI_MODEL_FAST: ${AI_MODEL_FAST:-deepseek-v4-flash}
      PRICE_SEED_ENABLED: ${PRICE_SEED_ENABLED:-false}
      AVATAR_STORAGE_DIR: /data/avatars
      PRODUCT_IMAGE_STORAGE_DIR: /data/product-images
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: zdsj-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CONF:-./nginx/default.http-only.conf}:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/snippets:/etc/nginx/conf.d/snippets:ro
      - ./certs:/etc/nginx/certs:ro
      - avatar_data:/data/avatars:ro
      - product_image_data:/data/product-images:ro
      - ../web/dist:/var/www/web:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  avatar_data:
  product_image_data:
