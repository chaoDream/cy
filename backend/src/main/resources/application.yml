spring:
  application:
    name: zdsj-backend
  profiles:
    active: dev
  config:
    import: optional:file:./application-local.yml,optional:file:./price-seeds.yml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/zdsj}
    username: ${DB_USER:zdsj}
    password: ${DB_PASSWORD:zdsj_dev_pwd}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Shanghai
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  quartz:
    job-store-type: memory

server:
  port: 8080
  address: 0.0.0.0   # 允许局域网设备（真机）访问

# 业务配置
zdsj:
  jwt:
    secret: ${JWT_SECRET:zdsj_dev_secret_please_change_in_prod_at_least_32_bytes}
    ttl-seconds: 7776000       # 90 天（配合小程序端 wx.login 静默续登，登录态长期保持）
  wechat:
    appid: ${WX_APPID:wx_dev_appid}
    secret: ${WX_SECRET:wx_dev_secret}
    # 微信订阅消息模板（降价提醒）
    subscribe-template-id: ${WX_SUB_TEMPLATE:dev_template_id}
  affiliate:
    # 联盟 API：未配置时走 mock 适配器（本地可跑通闭环）
    mock: ${AFFILIATE_MOCK:false}
    # 提供商路由：primary 主源，fallback 降级链（按序兜底），mock 永远兜底
    # 可选值：veapi | jd_official | pdd_official | mock
    provider:
      jd:
        primary: ${JD_PROVIDER_PRIMARY:mock}
        fallback: ${JD_PROVIDER_FALLBACK:mock}
        auto-failover: ${JD_PROVIDER_AUTO_FAILOVER:true}
      pdd:
        primary: ${PDD_PROVIDER_PRIMARY:mock}
        fallback: ${PDD_PROVIDER_FALLBACK:mock}
        auto-failover: ${PDD_PROVIDER_AUTO_FAILOVER:true}
    # 维易 VEAPI（购买核心接口卡后填 vekey；secret 为空则不加签）
    veapi:
      base-url: ${VEAPI_BASE_URL:http://api.veapi.cn}
      vekey: ${VEAPI_VEKEY:}
      secret: ${VEAPI_SECRET:}
      jd:
        auth-mode: ${VEAPI_JD_AUTH_MODE:self}   # self=自有联盟号 | public=维易公共号
        sessionkey: ${VEAPI_JD_SESSIONKEY:}
        union-id: ${VEAPI_JD_UNION_ID:}
        position-id: ${VEAPI_JD_POSITION_ID:}
        scene-id: ${VEAPI_JD_SCENE_ID:2}        # 维易+京东单品转链：2=item.jd.com/数字SKU
        chain-type: ${VEAPI_JD_CHAIN_TYPE:1}    # 1=长链 clickURL（直达商品页更稳）
      pdd:
        auth-mode: ${VEAPI_PDD_AUTH_MODE:self}
        sessionkey: ${VEAPI_PDD_SESSIONKEY:}
        pid: ${VEAPI_PDD_PID:}
    # 熔断：连续失败达阈值则冷却期内跳过该 provider
    breaker:
      fail-threshold: ${AFFILIATE_BREAKER_THRESHOLD:3}
      cooldown-seconds: ${AFFILIATE_BREAKER_COOLDOWN:60}
    # Gateway 缓存 TTL（秒）
    cache:
      item-ttl-seconds: ${AFFILIATE_CACHE_ITEM_TTL:600}
      cps-ttl-seconds: ${AFFILIATE_CACHE_CPS_TTL:21600}
      empty-ttl-seconds: ${AFFILIATE_CACHE_EMPTY_TTL:45}
      search-ttl-seconds: ${AFFILIATE_CACHE_SEARCH_TTL:120}
    pdd:
      client-id: ${PDD_CLIENT_ID:}
      client-secret: ${PDD_CLIENT_SECRET:}
      pid: ${PDD_PID:}
    jd:
      app-key: ${JD_APP_KEY:}
      app-secret: ${JD_APP_SECRET:}
      union-id: ${JD_UNION_ID:}
      site-id: ${JD_SITE_ID:}
      position-id: ${JD_POSITION_ID:}
  ai:
    # 大模型（DeepSeek OpenAI 兼容）：未配置 api-key 或 mock=true 时走规则推理
    mock: ${AI_MOCK:true}
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model-high: ${AI_MODEL_HIGH:deepseek-v4-flash}
    model-fast: ${AI_MODEL_FAST:deepseek-v4-flash}
  watch:
    # 漏斗轮询频率（cron）
    poll-hot-cron: "0 0 */2 * * ?"     # 热门 SKU 每 2h
    poll-user-cron: "0 30 */4 * * ?"   # 用户关注 每 4h
    poll-normal-cron: "0 0 4 * * ?"    # 普通 每天 04:00
  price-seed:
    # 冷启动历史价：配商品名称 → 自动在京东/拼多多搜索 → 每天采价攒曲线
    # 长清单可放到 backend/price-seeds.yml（spring.config.import 自动加载）
    enabled: ${PRICE_SEED_ENABLED:false}
    poll-cron: "0 0 6 * * ?"           # 名称模式：每天 06:00 采价
    search-limit: 10
    items:
      - name: "iPhone 16 Pro 256GB 国行"
        platforms: [jd, pdd]
      - name: "华为 Mate 70 Pro 256GB 国行"
        platforms: [jd, pdd]
      - name: "小米 15 Pro 512GB 国行"
        platforms: [jd]
      - name: "vivo X200 Pro 512GB 国行"
        platforms: [jd, pdd]
        enabled: false                   # 示例：单条停用
  subsidy:
    # 政府国补规则表（无实时 API，按地区维护；以当地政策与名额为准）
    # region 需与用户资产库 govSubsidyRegion 精确匹配；rate=比例，cap=封顶(元)，min-price=享补门槛(元)
    enabled: ${GOV_SUBSIDY_ENABLED:false}
    regions:
      - region: "上海市"
        rate: 0.15
        cap: 2000
        min-price: 0
      - region: "江苏省"
        rate: 0.15
        cap: 1500
      - region: "广东省"
        rate: 0.10
        cap: 1000
        enabled: false              # 示例：单条停用
  avatar:
    storage-dir: ${AVATAR_STORAGE_DIR:./data/avatars}
    public-path-prefix: /static/avatars
    max-bytes: 512000
    download-timeout-seconds: 10
  product-image:
    storage-dir: ${PRODUCT_IMAGE_STORAGE_DIR:./data/product-images}
    public-path-prefix: /static/products
    max-bytes: 1048576
    download-timeout-seconds: 15

logging:
  level:
    com.zdsj: INFO
